name = "cronometer-mcp"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret vars can go here. Secrets are set via:
#   npx wrangler secret put CRONOMETER_SESSION_TOKEN
#   npx wrangler secret put CRONOMETER_USER_ID
#   npx wrangler secret put CRONOMETER_USERNAME
#   npx wrangler secret put CRONOMETER_PASSWORD
#   npx wrangler secret put MCP_AUTH_TOKEN
#   npx wrangler secret put OAUTH_CLIENT_ID
#   npx wrangler secret put CRONOMETER_GWT_PERMUTATION
#   npx wrangler secret put CRONOMETER_GWT_HEADER
